# Hand-written OpenAPI spec for HawkScan (stackhawk.yml points here) so the
# DAST scan can exercise the JSON POST endpoints, not just the HTML pages.
# Not consumed by the app itself.
openapi: 3.0.3
info:
  title: UnraveledPlayer scenario_builder API
  version: "1.0"
paths:
  /topology:
    get:
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
            enum: [segmented, unraveled, toy]
            example: segmented
      responses:
        "200":
          description: zones, nodes, edges, technique catalog
  /compile:
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              example: &spec_example
                topology: unraveled
                base_time: 1700000000000
                step_ms: 50000
                attackers:
                  - {name: APT09, entry_ip: 203.0.113.9, initial_access: T1078, default_port: 22}
                moves:
                  - {attacker: APT09, src: external, dst: it_host_2, technique: T1078, kind: foothold, t: 1700000050000}
                  - {attacker: APT09, src: it_host_2, dst: honeypot_server, technique: T1021.004, port: 22, t: 1700000150000}
      responses:
        "200":
          description: "{report, jsonl, alert_count, sessions}"
  /evolution:
    post:
      parameters:
        - name: gt
          in: query
          required: false
          schema:
            type: string
            enum: ["0", "1"]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              example: *spec_example
      responses:
        "200":
          description: "{dot, svg, note, sessions}"
  /import:
    post:
      parameters:
        - name: topology
          in: query
          required: false
          schema:
            type: string
            enum: [segmented, unraveled, toy]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: string
              description: synthetic_alerts.jsonl body (one OCSF alert per line)
              example: "{}"
      responses:
        "200":
          description: "{spec, report}"
