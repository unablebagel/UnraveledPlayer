# Mirrors main to the Hugging Face Space on every push.
# Needs an HF write token stored as the HF_TOKEN repo secret.
name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      HF_SPACE: CHANGEME/UnraveledPlayer  # <hf-username>/<space-name>
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Space
        run: git push --force "https://oauth:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/${HF_SPACE}" main
